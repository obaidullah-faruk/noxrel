name: CI
on: [push, pull_request]

jobs:
  lint-test-python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: user-service
            install_cmd: "pip install uv && uv sync --group dev"
            lint_cmd: "uv run ruff check . && uv run mypy . --ignore-missing-imports"
            test_cmd: "uv run python manage.py migrate --run-syncdb && uv run pytest tests/ -v --tb=short"
            django_settings: "config.settings"
          - service: video-service
            install_cmd: "pip install uv && uv sync --group dev"
            lint_cmd: "uv run ruff check . && uv run mypy . --ignore-missing-imports"
            test_cmd: "uv run pytest tests/ -v --tb=short"
            django_settings: "config.test_settings"
          - service: transcode-worker
            install_cmd: "pip install uv && uv sync --group dev"
            lint_cmd: "uv run ruff check . && uv run mypy . --ignore-missing-imports"
            test_cmd: "uv run pytest tests/ -v --tb=short"
            django_settings: ""
          - service: billing-service
            install_cmd: "pip install uv && uv sync --group dev"
            lint_cmd: "uv run ruff check . && uv run mypy . --ignore-missing-imports"
            test_cmd: "uv run pytest tests/ -v --tb=short"
            django_settings: ""

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: user_service
          POSTGRES_USER: platform
          POSTGRES_PASSWORD: platform_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U platform"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:8.4.3-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: user_service
      DB_USER: platform
      DB_PASSWORD: platform_dev
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key
      DEBUG: "true"

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install & lint
        working-directory: services/${{ matrix.service }}
        run: |
          ${{ matrix.install_cmd }}
          ${{ matrix.lint_cmd }}
      - name: Test
        working-directory: services/${{ matrix.service }}
        run: ${{ matrix.test_cmd }}

  lint-test-node:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: streaming-service

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json
      - name: Install
        working-directory: services/${{ matrix.service }}
        run: npm ci
      - name: Lint
        working-directory: services/${{ matrix.service }}
        run: npm run lint
      - name: Typecheck
        working-directory: services/${{ matrix.service }}
        run: npm run typecheck
      - name: Test
        working-directory: services/${{ matrix.service }}
        run: npm test
