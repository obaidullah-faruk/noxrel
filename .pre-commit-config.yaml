default_stages: [pre-commit]

repos:
  # --- General hygiene ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: detect-private-key
        exclude: ^services/.*/config/settings\.py$

  # --- Python: ruff lint + format ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.12
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # --- Python: mypy type checking ---
  # Uses `local` + language:system so it runs `uv run mypy` inside each
  # service's own venv rather than pre-commit's isolated Python environment.
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        language: system
        pass_filenames: false
        entry: bash -c 'for svc in services/*/; do [ -f "$svc/pyproject.toml" ] && (cd "$svc" && uv run mypy . --ignore-missing-imports --no-error-summary) || true; done'
        files: ^services/

  # --- Conventional Commits ---
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.8.3
    hooks:
      - id: commitizen
        stages: [commit-msg]
