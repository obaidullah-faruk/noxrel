apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Elasticsearch
    uid: elasticsearch
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    database: noxrel-logs-*
    basicAuth: true
    basicAuthUser: elastic
    secureJsonData:
      basicAuthPassword: $__env{ELASTIC_PASSWORD}
    jsonData:
      timeField: ts
      esVersion: "8.0.0"
      logMessageField: message
      logLevelField: level
    editable: false
