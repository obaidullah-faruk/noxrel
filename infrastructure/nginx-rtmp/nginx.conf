worker_processes auto;

events { worker_connections 1024; }

rtmp {
  server {
    listen 1935;
    chunk_size 4096;

    application live {
      live on;
      record off;

      # live-service validates the stream key and starts FFmpeg. A non-2xx
      # reply from on_publish rejects the broadcaster. Keep the handler fast —
      # nginx-rtmp times the hook out quickly.
      on_publish      http://live-service:3000/internal/rtmp/on_publish;
      on_publish_done http://live-service:3000/internal/rtmp/on_publish_done;

      # FFmpeg (inside live-service's network) pulls from this app; viewers
      # never play from RTMP — they get HLS from CloudFront/S3.
      deny play all;
    }
  }
}

http {
  server {
    listen 8080;  # internal only — never published to the host

    location /health { return 200 "ok"; }

    # Lets live-service drop a publisher (admin force-end, key revocation).
    # Dropping the publisher triggers on_publish_done → the normal finalize path.
    location /control {
      rtmp_control all;
    }
  }
}
