apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluent-bit
  namespace: platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluent-bit
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluent-bit
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fluent-bit
subjects:
  - kind: ServiceAccount
    name: fluent-bit
    namespace: platform
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: platform
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush        5
        Log_Level    info
        Parsers_File parsers.conf
        HTTP_Server  Off

    # Tail all pod log files on the node filesystem.
    # Kubernetes filter below enriches each record with pod/namespace/container metadata.
    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        multiline.parser  docker, cri
        Tag               kube.*
        Refresh_Interval  5
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On

    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On

    [FILTER]
        Name    modify
        Match   kube.*
        Rename  time @timestamp

    [OUTPUT]
        Name               es
        Match              kube.*
        Host               host.docker.internal
        Port               9200
        HTTP_User          elastic
        HTTP_Passwd        ${ELASTIC_PASSWORD}
        Index              noxrel-logs
        Logstash_Format    On
        Logstash_Prefix    noxrel-logs
        Time_Key           @timestamp
        Suppress_Type_Name On
        Retry_Limit        3

  parsers.conf: |
    [PARSER]
        Name        json
        Format      json
        Time_Key    ts
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
        Time_Keep   On
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: platform
spec:
  selector:
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
    spec:
      serviceAccountName: fluent-bit
      tolerations:
        # Run on every node including control-plane (needed for single-node minikube)
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: fluent-bit
          image: fluent/fluent-bit:5.0.6
          env:
            - name: ELASTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: observability-secrets
                  key: ELASTIC_PASSWORD
          volumeMounts:
            - mountPath: /fluent-bit/etc/fluent-bit.conf
              name: fluent-bit-config
              subPath: fluent-bit.conf
            - mountPath: /fluent-bit/etc/parsers.conf
              name: fluent-bit-config
              subPath: parsers.conf
            # Node log directories — read-only access to pod logs
            - mountPath: /var/log
              name: varlog
              readOnly: true
            - mountPath: /var/lib/docker/containers
              name: dockercontainers
              readOnly: true
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
      volumes:
        - name: fluent-bit-config
          configMap:
            name: fluent-bit-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: dockercontainers
          hostPath:
            path: /var/lib/docker/containers
