apiVersion: v1
kind: ConfigMap
metadata:
  name: streaming-service-config
  namespace: platform
data:
  PORT: "3002"
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  REDIS_URL: "redis://host.docker.internal:6379/2"
  KAFKA_BROKERS: "host.docker.internal:9094"
  AWS_REGION: "us-east-1"
  AWS_ENDPOINT_URL: "http://host.docker.internal:4566"
  S3_TRANSCODED_BUCKET: "transcoded-videos"
  # Browser-reachable CDN base — host machine LocalStack
  CDN_BASE_URL: "http://localhost:4566"
