apiVersion: v1
kind: ConfigMap
metadata:
  name: transcode-worker-config
  namespace: platform
data:
  LOG_LEVEL: "INFO"
  DEBUG: "false"
  KAFKA_BOOTSTRAP_SERVERS: "host.docker.internal:9094"
  KAFKA_SECURITY_PROTOCOL: "PLAINTEXT"
  KAFKA_CONSUMER_GROUP: "transcode-worker"
  AWS_REGION: "us-east-1"
  AWS_S3_ENDPOINT_URL: "http://host.docker.internal:4566"
  S3_RAW_BUCKET: "raw-videos"
  S3_TRANSCODED_BUCKET: "transcoded-videos"
  S3_THUMBNAIL_BUCKET: "thumbnails"
  CLOUDFRONT_BASE_URL: "http://localhost:4566/transcoded-videos"
  FFMPEG_PRESET: "fast"
  FFMPEG_CRF: "23"
  HLS_SEGMENT_DURATION: "6"
  TRANSCODE_MAX_RETRIES: "3"
