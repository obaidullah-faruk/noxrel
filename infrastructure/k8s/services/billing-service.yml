apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-service
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: billing-service
  template:
    metadata:
      labels:
        app: billing-service
    spec:
      initContainers:
        - name: migrate
          image: billing-service:local
          imagePullPolicy: Never
          command:
            - alembic
            - upgrade
            - head
          envFrom:
            - configMapRef:
                name: billing-service-config
            - secretRef:
                name: billing-service-secrets
      containers:
        - name: billing-service
          image: billing-service:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8003
          envFrom:
            - configMapRef:
                name: billing-service-config
            - secretRef:
                name: billing-service-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: billing-service
  namespace: platform
spec:
  selector:
    app: billing-service
  ports:
    - port: 8003
      targetPort: 8003
  type: ClusterIP
