apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      initContainers:
        - name: migrate
          image: user-service:local
          imagePullPolicy: Never
          command:
            - sh
            - -c
            - |
              uv run --frozen --no-dev python manage.py migrate --noinput &&
              uv run --frozen --no-dev python manage.py seed_rbac &&
              uv run --frozen --no-dev python manage.py create_dev_admin
          envFrom:
            - configMapRef:
                name: user-service-config
            - secretRef:
                name: user-service-secrets
      containers:
        - name: user-service
          image: user-service:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: user-service-config
            - secretRef:
                name: user-service-secrets
          # gunicorn needs a writable tmpfs for prometheus multiprocess metrics
          volumeMounts:
            - mountPath: /tmp/prometheus_multiproc
              name: prometheus-multiproc
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
      volumes:
        - name: prometheus-multiproc
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: platform
spec:
  selector:
    app: user-service
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
