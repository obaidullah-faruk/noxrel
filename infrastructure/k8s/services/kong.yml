apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
  namespace: platform
data:
  # Kong is inside the cluster — routes to other pods via cluster-internal DNS.
  # This is the only place .platform.svc.cluster.local DNS is used.
  kong.yml: |
    _format_version: "3.0"
    _transform: true

    services:
      - name: user-service
        url: http://user-service.platform.svc.cluster.local:8000
        routes:
          - name: auth-routes
            paths:
              - /api/v1/auth
            strip_path: false
            plugins:
              - name: rate-limiting
                config:
                  minute: 20
                  policy: local
          - name: user-routes
            paths:
              - /api/v1/users
              - /api/v1/roles
              - /api/v1/permissions
            strip_path: false

      - name: video-service
        url: http://video-service.platform.svc.cluster.local:8001
        routes:
          - name: video-routes
            paths:
              - /api/v1/videos
              - /api/v1/catalog
            strip_path: false

      - name: streaming-service
        url: http://streaming-service.platform.svc.cluster.local:3002
        routes:
          - name: streaming-routes
            paths:
              - /api/v1/stream
            strip_path: false

    plugins:
      - name: cors
        config:
          origins:
            - "http://localhost:3000"
            - "http://localhost:3001"
          methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
          headers:
            - Authorization
            - Content-Type
            - X-Request-ID
          exposed_headers:
            - X-Request-ID
          credentials: true
          max_age: 3600

      - name: correlation-id
        config:
          header_name: X-Request-ID
          generator: uuid
          echo_downstream: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kong
  template:
    metadata:
      labels:
        app: kong
    spec:
      containers:
        - name: kong
          image: kong:3.9-ubuntu
          env:
            - name: KONG_DATABASE
              value: "off"
            - name: KONG_DECLARATIVE_CONFIG
              value: "/etc/kong/kong.yml"
            - name: KONG_PROXY_ACCESS_LOG
              value: "/dev/stdout"
            - name: KONG_ADMIN_ACCESS_LOG
              value: "/dev/stdout"
            - name: KONG_PROXY_ERROR_LOG
              value: "/dev/stderr"
            - name: KONG_ADMIN_ERROR_LOG
              value: "/dev/stderr"
            - name: KONG_ADMIN_LISTEN
              value: "0.0.0.0:8001"
            - name: KONG_PROXY_LISTEN
              value: "0.0.0.0:8000"
          ports:
            - name: proxy
              containerPort: 8000
            - name: admin
              containerPort: 8001
          volumeMounts:
            - mountPath: /etc/kong/kong.yml
              name: kong-config
              subPath: kong.yml
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            exec:
              command: ["kong", "health"]
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 5
      volumes:
        - name: kong-config
          configMap:
            name: kong-config
---
apiVersion: v1
kind: Service
metadata:
  name: kong
  namespace: platform
spec:
  selector:
    app: kong
  ports:
    - name: proxy
      port: 8100
      targetPort: 8000
      nodePort: 30100
    - name: admin
      port: 8101
      targetPort: 8001
      nodePort: 30101
  type: NodePort
