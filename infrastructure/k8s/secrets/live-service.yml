apiVersion: v1
kind: Secret
metadata:
  name: live-service-secrets
  namespace: platform
type: Opaque
stringData:
  # LocalStack accepts any credentials; "test"/"test" matches the other services.
  AWS_ACCESS_KEY_ID: "test"
  AWS_SECRET_ACCESS_KEY: "test"

  # Shared dev key for the video-service internal replay-registration endpoint.
  INTERNAL_API_KEY: "dev-internal-key"

  # RS256 PUBLIC key only — live-service verifies tokens, never issues them.
