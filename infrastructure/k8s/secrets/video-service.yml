apiVersion: v1
kind: Secret
metadata:
  name: video-service-secrets
  namespace: platform
type: Opaque
stringData:
  SECRET_KEY: "dev-secret-key-change-in-production"
  DB_USER: "noxrel"
  DB_PASSWORD: "noxrel"
  # Leave empty to use the built-in dev default (matches user-service dev key)
  JWT_PUBLIC_KEY: ""
  # LocalStack uses dummy credentials
  AWS_ACCESS_KEY_ID: "test"
  AWS_SECRET_ACCESS_KEY: "test"
