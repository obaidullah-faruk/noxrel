# Application services
# Run with: docker compose -f docker-compose.infra.yml -f docker-compose.yml up -d

services:
  user-service-test:
    build:
      context: ../services/user-service
      dockerfile: Dockerfile
      target: test
    env_file:
      - ../services/user-service/.env
    environment:
      REDIS_URL: redis://redis:6379/15
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        uv run python manage.py collectstatic --noinput -v 0 &&
        uv run pytest /app/tests/ -v --tb=short
      "
    profiles: ["test"]

  user-service:
    build:
      context: ../services/user-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../services/user-service/.env
    environment:
      # Shared dir for prometheus_client multiprocess mode (gunicorn workers).
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus_multiproc
    tmpfs:
      - /tmp/prometheus_multiproc
    volumes:
      - ../services/user-service:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 5
    logging:
      driver: fluentd
      options:
        fluentd-address: 127.0.0.1:24224
        fluentd-async: "true"
        tag: user-service
    command: >
      sh -c "
        uv sync --frozen --no-dev &&
        uv run python manage.py collectstatic --noinput &&
        uv run python manage.py migrate --noinput &&
        uv run python manage.py seed_rbac &&
        uv run python manage.py create_dev_admin &&
        uv run gunicorn config.wsgi:application --config gunicorn.conf.py
      "
    restart: unless-stopped

  video-service-test:
    build:
      context: ../services/video-service
      dockerfile: Dockerfile
      target: test
    env_file:
      - ../services/video-service/.env
    environment:
      REDIS_URL: redis://redis:6379/15
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        uv run python manage.py collectstatic --noinput -v 0 &&
        uv run pytest /app/tests/ -v --tb=short
      "
    profiles: ["test"]

  video-service:
    build:
      context: ../services/video-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - ../services/video-service/.env
    environment:
      # Shared dir for prometheus_client multiprocess mode (gunicorn workers).
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus_multiproc
    tmpfs:
      - /tmp/prometheus_multiproc
    volumes:
      - ../services/video-service:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health/"]
      interval: 15s
      timeout: 5s
      start_period: 45s
      retries: 5
    logging:
      driver: fluentd
      options:
        fluentd-address: 127.0.0.1:24224
        fluentd-async: "true"
        tag: video-service
    command: >
      sh -c "
        uv sync --frozen --no-dev &&
        uv run python manage.py collectstatic --noinput &&
        uv run python manage.py migrate --noinput &&
        uv run python manage.py consume_transcode_events &
        uv run gunicorn config.wsgi:application --config gunicorn.conf.py
      "
    restart: unless-stopped

  transcode-worker:
    build:
      context: ../services/transcode-worker
      dockerfile: Dockerfile
      target: production
    env_file:
      - ../services/transcode-worker/.env
    volumes:
      - ../services/transcode-worker:/app
    command: >
      sh -c "
        uv sync --frozen --no-dev &&
        uv run python -m app.worker
      "
    depends_on:
      kafka:
        condition: service_healthy
      localstack:
        condition: service_healthy
    logging:
      driver: fluentd
      options:
        fluentd-address: 127.0.0.1:24224
        fluentd-async: "true"
        tag: transcode-worker
    restart: unless-stopped

  streaming-service:
    build:
      context: ../services/streaming-service
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3002:3002"
    env_file:
      - ../services/streaming-service/.env
    volumes:
      - ../services/streaming-service/src:/app/src
    command: ["npm", "run", "dev"]
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3002/health || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    logging:
      driver: fluentd
      options:
        fluentd-address: 127.0.0.1:24224
        fluentd-async: "true"
        tag: streaming-service
    restart: unless-stopped

  billing-service-test:
    build:
      context: ../services/billing-service
      dockerfile: Dockerfile
      target: test
    env_file:
      - ../services/billing-service/.env
    environment:
      DB_HOST: postgres
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "uv run pytest /app/tests/ -v --tb=short"
    profiles: ["test"]

  billing-service:
    build:
      context: ../services/billing-service
      dockerfile: Dockerfile
      target: production
    ports:
      - "8003:8003"
    env_file:
      - ../services/billing-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5
    logging:
      driver: fluentd
      options:
        fluentd-address: 127.0.0.1:24224
        fluentd-async: "true"
        tag: billing-service
    command: >
      sh -c "
        uv sync --frozen --no-dev &&
        uv run alembic upgrade head &&
        uv run uvicorn app.main:app --host 0.0.0.0 --port 8003
      "
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.153.0
    command: ["--config=/etc/otel/otel-collector-config.yaml"]
    environment:
      ENVIRONMENT: development
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otel/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics exporter
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  fluent-bit:
    image: fluent/fluent-bit:5.0.6
    environment:
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
    volumes:
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
    ports:
      - "24224:24224"   # fluentd forward protocol — app services send logs here
      - "24224:24224/udp"
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  kong:
    image: kong:3.9-ubuntu
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
    ports:
      - "8100:8000"   # Kong proxy  → http://localhost:8100/api/v1/...
      - "8101:8001"   # Kong admin  → http://localhost:8101 (status/config)
    volumes:
      - ./kong/kong.yml:/etc/kong/kong.yml:ro
    depends_on:
      user-service:
        condition: service_healthy
      video-service:
        condition: service_healthy
      streaming-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped
