# Application services
# Run with: docker compose -f docker-compose.infra.yml -f docker-compose.yml up -d

services:
  user-service-test:
    build:
      context: ../services/user-service
      dockerfile: Dockerfile
      target: test
    env_file:
      - ../services/user-service/.env
    environment:
      REDIS_URL: redis://redis:6379/15
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        uv run python manage.py collectstatic --noinput -v 0 &&
        uv run pytest /app/tests/ -v --tb=short
      "
    profiles: ["test"]

  user-service:
    build:
      context: ../services/user-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../services/user-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 5
    command: >
      sh -c "
        uv run python manage.py collectstatic --noinput &&
        uv run python manage.py migrate --noinput &&
        uv run python manage.py seed_rbac &&
        uv run python manage.py create_dev_admin &&
        uv run gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 60 --access-logfile -
      "
    restart: unless-stopped

  video-service-test:
    build:
      context: ../services/video-service
      dockerfile: Dockerfile
      target: test
    env_file:
      - ../services/video-service/.env
    environment:
      REDIS_URL: redis://redis:6379/15
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        uv run python manage.py collectstatic --noinput -v 0 &&
        uv run pytest /app/tests/ -v --tb=short
      "
    profiles: ["test"]

  video-service:
    build:
      context: ../services/video-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - ../services/video-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      localstack:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health/"]
      interval: 15s
      timeout: 5s
      start_period: 45s
      retries: 5
    command: >
      sh -c "
        uv run python manage.py collectstatic --noinput &&
        uv run python manage.py migrate --noinput &&
        uv run gunicorn config.wsgi:application --bind 0.0.0.0:8001 --workers 4 --timeout 60 --access-logfile -
      "
    restart: unless-stopped

  streaming-service:
    build:
      context: ../services/streaming-service
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    env_file:
      - ../services/streaming-service/.env
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3002/health || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    restart: unless-stopped

  kong:
    image: kong:3.9-ubuntu
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
    ports:
      - "8100:8000"   # Kong proxy  → http://localhost:8100/api/v1/...
      - "8101:8001"   # Kong admin  → http://localhost:8101 (status/config)
    volumes:
      - ./kong/kong.yml:/etc/kong/kong.yml:ro
    depends_on:
      user-service:
        condition: service_healthy
      video-service:
        condition: service_healthy
      streaming-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped
