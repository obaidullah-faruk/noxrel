receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024
  resource:
    attributes:
      - key: deployment.environment
        value: ${ENVIRONMENT}
        action: upsert

exporters:
  otlp_grpc/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  # Elastic APM Server accepts OTLP directly on :8200. Fanning traces out here
  # (in addition to Jaeger) is what populates the APM app in Kibana.
  otlp_grpc/apm:
    endpoint: apm-server:8200
    tls:
      insecure: true
  prometheus:
    endpoint: "0.0.0.0:8889"
  elasticsearch:
    endpoints:
      - http://elasticsearch:9200
    user: elastic
    password: ${env:ELASTIC_PASSWORD}
    logs_index: platform-logs

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [otlp_grpc/jaeger, otlp_grpc/apm]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [elasticsearch]
