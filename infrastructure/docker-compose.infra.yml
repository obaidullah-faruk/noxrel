services:
  postgres:
    image: postgres:18-alpine
    environment:
      # User/DB the Django services connect as (services/*/.env: DB_USER=noxrel).
      POSTGRES_USER: noxrel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: noxrel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noxrel"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.4.3-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.12.0
    environment:
      discovery.type: single-node
      # Security enabled so Kibana Fleet can install the APM integration index
      # templates (traces-apm/metrics-apm/logs-apm). Dev-only credentials.
      xpack.security.enabled: "true"
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s -u elastic:$$ELASTIC_PASSWORD http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka:
    image: apache/kafka:4.0.2
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # INTERNAL for container-to-container traffic, EXTERNAL for host access
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  localstack:
    image: localstack/localstack:3.8
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,sqs,sns,ssm,secretsmanager
      DEFAULT_REGION: us-east-1
      LOCALSTACK_HOST: localhost
    volumes:
      - ./localstack/init-scripts:/etc/localstack/init/ready.d
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:4566/_localstack/health | grep -q 's3.*running'"]
      interval: 15s
      timeout: 10s
      retries: 10

  # One-shot: set the kibana_system password and enable the built-in user, so
  # Kibana can authenticate to a security-enabled Elasticsearch. Idempotent.
  es-setup:
    image: elasticsearch:8.12.0
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
    entrypoint: ["bash", "-c"]
    command:
      - >
        until curl -s -u elastic:$$ELASTIC_PASSWORD http://elasticsearch:9200/_security/user/kibana_system/_password
        -H 'Content-Type: application/json' -d "{\"password\":\"$$ELASTIC_PASSWORD\"}" | grep -q '{}'; do
          echo 'waiting for elasticsearch security to be ready...'; sleep 3;
        done;
        echo 'kibana_system password set.'
    restart: "no"

  kibana:
    image: kibana:8.12.0
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      ELASTICSEARCH_USERNAME: kibana_system
      ELASTICSEARCH_PASSWORD: ${ELASTIC_PASSWORD}
      # Fixed 32-char encryption keys so Fleet/saved-object secrets survive
      # restarts (dev-only; rotate for production).
      XPACK_SECURITY_ENCRYPTIONKEY: "noxrel_dev_security_encryptionkey_32__"
      XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY: "noxrel_dev_savedobjects_encryptionk_32"
      XPACK_REPORTING_ENCRYPTIONKEY: "noxrel_dev_reporting_encryptionkey__32"
      # Tell Fleet where APM/agents should send data.
      XPACK_FLEET_PACKAGES: '[{"name":"apm","version":"latest"}]'
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
      es-setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status | grep -q '\"level\":\"available\"'"]
      interval: 20s
      timeout: 10s
      retries: 15

  # One-shot: creates the Noxrel Logs data view and dashboard in Kibana so
  # Discover and Dashboards work on first boot without manual setup. Idempotent.
  kibana-init:
    image: curlimages/curl:8.7.1
    depends_on:
      kibana:
        condition: service_healthy
    environment:
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
    volumes:
      - ./kibana/init.sh:/kibana/init.sh:ro
      - ./kibana/data_view.json:/kibana/data_view.json:ro
      - ./kibana/dashboard.json:/kibana/dashboard.json:ro
    entrypoint: ["sh", "/kibana/init.sh"]
    restart: "no"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.153.0
    command: ["--config=/etc/otel/otel-collector-config.yaml"]
    environment:
      ENVIRONMENT: development
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otel/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics exporter
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "14317:4317"    # OTLP gRPC (host-side remapped to avoid clash with otel-collector)
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.12.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yaml:/etc/prometheus/alerts.yaml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:13.0.1
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # Exposed to the provisioned Elasticsearch datasource via $__env{ELASTIC_PASSWORD}.
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3003:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.8.0
    command: ["--kafka.server=kafka:29092"]
    ports:
      - "9308:9308"
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  apm-server:
    image: elastic/apm-server:8.12.0
    # Fleet-managed mode: Kibana installs the APM integration (XPACK_FLEET_PACKAGES),
    # which creates the traces-apm/metrics-apm/logs-apm index templates with correct
    # mappings. apm-server waits for that integration, then publishes into the proper
    # data streams — so processor.event is mapped and the Kibana APM UI lists services.
    environment:
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
    # Run through a shell so $ELASTIC_PASSWORD expands at runtime. apm-server's
    # default entrypoint execs its args directly (no shell), so a bare command
    # would pass the literal string "$ELASTIC_PASSWORD" and ES auth would 401.
    entrypoint: ["sh", "-c"]
    command:
      - >
        apm-server -e
        -E apm-server.rum.enabled=true
        -E apm-server.kibana.enabled=true
        -E apm-server.kibana.host=kibana:5601
        -E apm-server.kibana.username=elastic
        -E apm-server.kibana.password=$$ELASTIC_PASSWORD
        -E setup.template.settings.index.number_of_replicas=0
        -E output.elasticsearch.hosts=["elasticsearch:9200"]
        -E output.elasticsearch.username=elastic
        -E output.elasticsearch.password=$$ELASTIC_PASSWORD
    ports:
      - "8200:8200"
    depends_on:
      elasticsearch:
        condition: service_healthy
      kibana:
        condition: service_healthy
    restart: unless-stopped

  fluent-bit:
    image: fluent/fluent-bit:5.0.6
    environment:
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
    volumes:
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
    ports:
      - "24224:24224"   # fluentd protocol — services send logs here
      - "24224:24224/udp"
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  es_data:
  kafka_data:
  localstack_data:
  prometheus_data:
  grafana_data:
