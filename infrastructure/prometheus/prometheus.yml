global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yaml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  # OTel Collector pushes metrics via remote write — no scrape target needed here.
  # Works identically for Option A (Docker Compose) and Option B (Kubernetes).

  - job_name: user-service
    static_configs:
      - targets: ["user-service:8000"]
    metrics_path: /metrics

  - job_name: video-service
    static_configs:
      - targets: ["video-service:8001"]
    metrics_path: /metrics

  - job_name: streaming-service
    static_configs:
      - targets: ["streaming-service:3002"]
    metrics_path: /metrics

  - job_name: billing-service
    static_configs:
      - targets: ["billing-service:8003"]
    metrics_path: /metrics

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: kafka
    static_configs:
      - targets: ["kafka-exporter:9308"]
