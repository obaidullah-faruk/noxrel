groups:
  - name: noxrel
    rules:
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Error rate above 5% on {{ $labels.service }}"

      - alert: TranscodeQueueBacklog
        expr: kafka_consumer_lag{topic="video.uploaded"} > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Transcode queue has >100 pending jobs"

      - alert: ServiceDown
        expr: up{job=~".*-service"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"

      - alert: DatabaseConnectionsSaturated
        expr: pg_stat_activity_count / pg_settings_max_connections > 0.85
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connections at >85%"

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory above 90%"

      # [DEFERRED] Enable when billing-service is implemented
      # - alert: HighPaymentFailureRate
      #   expr: rate(payment_failures_total[10m]) > 0.10
      #   annotations:
      #     summary: "Payment failure rate above 10%"
