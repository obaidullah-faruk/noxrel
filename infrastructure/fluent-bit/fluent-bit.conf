[SERVICE]
    Flush        5
    Log_Level    info
    Parsers_File parsers.conf
    HTTP_Server  Off

[INPUT]
    Name              forward
    Listen            0.0.0.0
    Port              24224
    Buffer_Chunk_Size 1M
    Buffer_Max_Size   6M

[FILTER]
    Name      parser
    Match     *
    Key_Name  log
    Parser    json
    Reserve_Data On
    Preserve_Key On

[FILTER]
    Name    modify
    Match   *
    Rename  ts @timestamp

[OUTPUT]
    Name               es
    Match              *
    Host               elasticsearch
    Port               9200
    HTTP_User          elastic
    HTTP_Passwd        ${ELASTIC_PASSWORD}
    Index              platform-logs
    Logstash_Format    On
    Logstash_Prefix    platform-logs
    Time_Key           @timestamp
    Suppress_Type_Name On
    Retry_Limit        3
